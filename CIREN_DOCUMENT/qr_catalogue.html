<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>CIREN — QR Code</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;600;700&family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a0f1e;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 48px;
      padding: 48px 24px;
      font-family: 'Inter', 'Noto Sans JP', sans-serif;
    }

    h1 {
      color: #94a3b8;
      font-size: 13px;
      letter-spacing: 3px;
      text-transform: uppercase;
      text-align: center;
    }

    .cards {
      display: flex;
      gap: 40px;
      flex-wrap: wrap;
      justify-content: center;
    }

    /* ── DARK CARD (for screen / exhibition display) ─── */
    .card-dark {
      width: 320px;
      background: #050a14;
      border: 1px solid rgba(0, 212, 255, 0.25);
      border-radius: 20px;
      padding: 32px 28px 28px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      position: relative;
      box-shadow: 0 0 0 1px rgba(0,212,255,.1), 0 24px 64px rgba(0,0,0,.6), 0 0 80px rgba(0,212,255,.06);
    }

    .card-dark::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 20px;
      background:
        linear-gradient(rgba(0,212,255,.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,212,255,.025) 1px, transparent 1px);
      background-size: 24px 24px;
      pointer-events: none;
    }

    .card-dark::after {
      content: '';
      position: absolute;
      top: 0; left: 20%; right: 20%;
      height: 1px;
      background: linear-gradient(90deg, transparent, #00D4FF, transparent);
    }

    .brand-dark {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      z-index: 1;
    }

    .brand-dark .logo {
      font-size: 28px;
      font-weight: 800;
      letter-spacing: 6px;
      color: #00D4FF;
      text-shadow: 0 0 24px rgba(0,212,255,.5);
    }

    .brand-dark .tagline {
      font-size: 10px;
      color: #475569;
      letter-spacing: 2px;
      text-transform: uppercase;
      font-family: 'Noto Sans JP', sans-serif;
    }

    .qr-wrap-dark {
      background: #ffffff;
      border-radius: 12px;
      padding: 14px;
      position: relative;
      z-index: 1;
      box-shadow: 0 0 0 1px rgba(0,212,255,.3), 0 0 32px rgba(0,212,255,.15);
    }

    .qr-wrap-dark canvas { display: block; border-radius: 4px; }

    .scan-dark {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      z-index: 1;
    }

    .scan-dark .label-jp {
      font-size: 13px;
      font-weight: 600;
      color: #e2e8f0;
      font-family: 'Noto Sans JP', sans-serif;
      letter-spacing: 1px;
    }

    .scan-dark .label-en {
      font-size: 11px;
      color: #475569;
      letter-spacing: 1.5px;
      text-transform: uppercase;
    }

    .divider-dark {
      width: 100%;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(0,212,255,.2), transparent);
      z-index: 1;
    }

    .footer-dark {
      display: flex;
      align-items: center;
      gap: 6px;
      z-index: 1;
    }

    .dot-green {
      width: 6px; height: 6px;
      background: #22c55e;
      border-radius: 50%;
      box-shadow: 0 0 6px #22c55e;
      animation: pulse 2s infinite;
    }

    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

    .footer-dark span {
      font-size: 10px;
      color: #334155;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    /* ── LIGHT CARD (for print / A3 catalogue embed) ─── */
    .card-light {
      width: 320px;
      background: #ffffff;
      border: 1px solid #e2e8f0;
      border-radius: 20px;
      padding: 32px 28px 28px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      box-shadow: 0 4px 24px rgba(0,0,0,.08);
    }

    .brand-light .logo {
      font-size: 28px;
      font-weight: 800;
      letter-spacing: 6px;
      color: #0369a1;
      text-align: center;
    }

    .brand-light .tagline {
      font-size: 10px;
      color: #94a3b8;
      letter-spacing: 2px;
      text-transform: uppercase;
      text-align: center;
      font-family: 'Noto Sans JP', sans-serif;
      margin-top: 4px;
    }

    .qr-wrap-light {
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      padding: 14px;
    }

    .qr-wrap-light canvas { display: block; border-radius: 4px; }

    .scan-light {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }

    .scan-light .label-jp {
      font-size: 13px;
      font-weight: 600;
      color: #1e293b;
      font-family: 'Noto Sans JP', sans-serif;
      letter-spacing: 1px;
    }

    .scan-light .label-en {
      font-size: 11px;
      color: #94a3b8;
      letter-spacing: 1.5px;
      text-transform: uppercase;
    }

    .divider-light {
      width: 100%;
      height: 1px;
      background: #e2e8f0;
    }

    .footer-light {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .dot-blue {
      width: 6px; height: 6px;
      background: #0099CC;
      border-radius: 50%;
    }

    .footer-light span {
      font-size: 10px;
      color: #94a3b8;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    /* ── Labels ─── */
    .version-label {
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 4px 12px;
      border-radius: 20px;
    }

    .v-dark {
      color: #00D4FF;
      background: rgba(0,212,255,.08);
      border: 1px solid rgba(0,212,255,.2);
    }

    .v-light {
      color: #0369a1;
      background: #f0f9ff;
      border: 1px solid #bae6fd;
    }

    .card-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    /* Print styles — light card only */
    @media print {
      body { background: white; }
      .card-dark, .card-wrapper:first-child, h1 { display: none !important; }
      .cards { gap: 0; }
      .card-light { box-shadow: none; border: 1px solid #e2e8f0; }
    }
  </style>
</head>
<body>

<h1>CIREN — QR Code Generator &nbsp;·&nbsp; カタログ用QRコード</h1>

<div class="cards">

  <!-- DARK VERSION -->
  <div class="card-wrapper">
    <span class="version-label v-dark">Dark — Screen / Display</span>
    <div class="card-dark">
      <div class="brand-dark">
        <div class="logo">CIREN</div>
        <div class="tagline">産業用 IoT モニタリングシステム</div>
      </div>

      <div class="qr-wrap-dark">
        <canvas id="qr-dark"></canvas>
      </div>

      <div class="scan-dark">
        <div class="label-jp">QRコードをスキャンして</div>
        <div class="label-jp">カタログを閲覧する</div>
        <div class="label-en" style="margin-top:4px">Scan to view catalogue</div>
      </div>

      <div class="divider-dark"></div>

      <div class="footer-dark">
        <div class="dot-green"></div>
        <span>Nakayama Iron Co., Ltd.</span>
      </div>
    </div>
  </div>

  <!-- LIGHT VERSION -->
  <div class="card-wrapper">
    <span class="version-label v-light">Light — Print / A3 Catalogue</span>
    <div class="card-light">
      <div class="brand-light">
        <div class="logo">CIREN</div>
        <div class="tagline">産業用 IoT モニタリングシステム</div>
      </div>

      <div class="qr-wrap-light">
        <canvas id="qr-light"></canvas>
      </div>

      <div class="scan-light">
        <div class="label-jp">QRコードをスキャンして</div>
        <div class="label-jp">カタログを閲覧する</div>
        <div class="label-en" style="margin-top:4px">Scan to view catalogue</div>
      </div>

      <div class="divider-light"></div>

      <div class="footer-light">
        <div class="dot-blue"></div>
        <span>Nakayama Iron Co., Ltd.</span>
      </div>
    </div>
  </div>

</div>

<script>
  const URL = 'https://cireniot.nakayamairon.com/documents/ciren052026.pdf'
  const SIZE = 200

  QRCode.toCanvas(document.getElementById('qr-dark'), URL, {
    width: SIZE,
    margin: 1,
    color: { dark: '#050a14', light: '#ffffff' },
    errorCorrectionLevel: 'H',
  })

  QRCode.toCanvas(document.getElementById('qr-light'), URL, {
    width: SIZE,
    margin: 1,
    color: { dark: '#0f172a', light: '#f8fafc' },
    errorCorrectionLevel: 'H',
  })
</script>
</body>
</html>
