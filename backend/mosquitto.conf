# /etc/mosquitto/conf.d/ciren.conf
# Mosquitto config untuk CIREN di Jetson

# ─── Listener biasa (dari main module ESP32) ──────
listener 1883
allow_anonymous true

# ─── WebSocket listener (dari browser dashboard) ──
listener 9001
protocol websockets
allow_anonymous true

# ─── Logging ──────────────────────────────────────
log_dest stdout
log_type error
log_type warning
log_type notice
log_type information

# ─── Persistence ──────────────────────────────────
persistence true
persistence_location /opt/homebrew/var/mosquitto/

# ─── Limits ───────────────────────────────────────
max_keepalive 300
max_packet_size 65536
